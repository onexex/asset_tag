workflows:
  ios-build:
    name: Asset View iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Build iOS IPA (Unsigned)
        # Ang command na ito ay gagawa ng .ipa kahit walang certificates
        script: | 
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r asset_view.ipa Payload
    artifacts:
      - build/ios/iphoneos/*.ipa